<ion-header>
  <ion-toolbar color="primary">
    <ion-title>Cámara</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding fondo">
  <ion-grid>
    <ion-row>
      <ion-col size="12" size-md="6" *ngFor="let photo of photos">
        <ion-card>
          <img [src]="photo.image" alt="img" class="foto" />
          <ion-card-content>
            <p class="fecha">{{ photo.date }}</p>
            <p class="caption">{{ photo.caption }}</p>

            <ion-button fill="clear" color="danger" (click)="deletePhoto(photo)">
              <ion-icon name="trash"></ion-icon>
            </ion-button>
            <ion-button fill="clear" color="primary" (click)="editPhoto(photo)">
              <ion-icon name="create"></ion-icon>
            </ion-button>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

  <ion-fab vertical="bottom" horizontal="end">
    <ion-fab-button color="tertiary" (click)="takePicture()">
      <ion-icon name="camera"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
